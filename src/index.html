<!doctype html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="grid">
    <iframe src="http://192.168.1.200:8787/panel/pfdc?fps=60"></iframe>
    <iframe src="http://192.168.1.200:8787/panel/mfdc?fps=60"></iframe>
  </div>
</body>
</html>
